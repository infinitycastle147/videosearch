name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Step 1: Export ONNX models once (platform-independent) ──
  export-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install export dependencies
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install open_clip_torch onnx onnxruntime

      - name: Export CLIP to ONNX
        run: python scripts/export_onnx.py

      - name: Upload ONNX models
        uses: actions/upload-artifact@v4
        with:
          name: onnx-models
          path: models/
          retention-days: 1

  # ── Step 2: Build per-platform ──
  build:
    needs: export-models
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            bundle: dmg
            label: macOS-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            bundle: dmg
            label: macOS-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis
            label: Windows-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: appimage
            label: Linux-x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Download ONNX models
        uses: actions/download-artifact@v4
        with:
          name: onnx-models
          path: models/

      # ── System deps (Linux only) ──
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      # ── Python ──
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install onnxruntime numpy Pillow click fastapi uvicorn pyinstaller

      # ── Build PyInstaller sidecar ──
      - name: Build sidecar (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          pyinstaller videosearch_api.spec --noconfirm
          mkdir -p ui/src-tauri/binaries
          rm -rf ui/src-tauri/binaries/videosearch-api
          cp -R dist/videosearch-api ui/src-tauri/binaries/videosearch-api
          ln -sf "videosearch-api/videosearch-api" "ui/src-tauri/binaries/videosearch-api-${{ matrix.target }}"

      - name: Build sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller videosearch_api.spec --noconfirm
          New-Item -ItemType Directory -Force -Path ui/src-tauri/binaries
          if (Test-Path ui/src-tauri/binaries/videosearch-api) { Remove-Item -Recurse -Force ui/src-tauri/binaries/videosearch-api }
          Copy-Item -Recurse dist/videosearch-api ui/src-tauri/binaries/videosearch-api
          Copy-Item "dist/videosearch-api/videosearch-api.exe" "ui/src-tauri/binaries/videosearch-api-${{ matrix.target }}.exe"

      # ── Node.js ──
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      # ── Rust ──
      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ui/src-tauri

      # ── Tauri build ──
      - name: Build Tauri app
        working-directory: ui
        run: npx tauri build --bundles ${{ matrix.bundle }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      # ── Upload artifacts ──
      - name: Upload macOS DMG
        if: contains(matrix.bundle, 'dmg')
        uses: actions/upload-artifact@v4
        with:
          name: VideoSearch-${{ matrix.label }}
          path: ui/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Windows installer
        if: matrix.bundle == 'nsis'
        uses: actions/upload-artifact@v4
        with:
          name: VideoSearch-${{ matrix.label }}
          path: ui/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Linux AppImage
        if: matrix.bundle == 'appimage'
        uses: actions/upload-artifact@v4
        with:
          name: VideoSearch-${{ matrix.label }}
          path: ui/src-tauri/target/release/bundle/appimage/*.AppImage

  # ── Step 3: Create GitHub Release ──
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: VideoSearch-*
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
